services:
  server:
    build: ./server
    container_name: whiteboard-server
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_COACH_MODEL=${CLAUDE_COACH_MODEL:-claude-opus-4-7}
    volumes:
      # Bind-mount coach.db so sessions and attempts survive container restarts.
      # Server owns the DB; the web container only talks to it via MCP.
      - ./server/data:/app/data
    healthcheck:
      # FastMCP returns 406 (or 400 on older versions) for non-handshake GETs,
      # so we probe the listening TCP socket instead.
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000)); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  web:
    build: ./web
    container_name: whiteboard-web
    ports:
      - "3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_COACH_MODEL=${CLAUDE_COACH_MODEL:-claude-opus-4-7}
      - CLAUDE_AUX_MODEL=${CLAUDE_AUX_MODEL:-claude-haiku-4-5-20251001}
      - MCP_SERVER_URL=http://server:8000/mcp
    depends_on:
      server:
        condition: service_healthy
